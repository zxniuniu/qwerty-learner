# 微服务基础配置（注册中心 / 配置中心）
# 实际值建议放到 Nacos 配置中心，这里仅给出占位与默认
server:
  port: 8090

spring:
  application:
    name: jeesite-typing-service
  profiles:
    active: dev
  cloud:
    nacos:
      # 服务注册发现
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      # 配置中心
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
